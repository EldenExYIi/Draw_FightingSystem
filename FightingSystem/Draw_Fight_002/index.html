<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fight 002 MVP</title>
    <style>
      * { box-sizing: border-box; }

      :root {
        --bg: #f5f7fb;
        --ink: #17202a;
        --muted: #6f7d8d;
        --line: #d7deea;
        --accent: #ef5d67;
        --accent-2: #2e9d83;
        --card: #ffffff;
        --slot: #fdf8f4;
        --slot-line: #e8a78f;
        --enemy: #f484ad;
        --player: #8cadf4;
        --dark: #26313f;
      }

      html, body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      body {
        overflow: hidden;
      }

      button {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
        min-height: 34px;
        border-radius: 6px;
        padding: 0 10px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 140ms ease, border-color 140ms ease, background 140ms ease, color 140ms ease;
      }

      button:hover { border-color: #9cabbd; transform: translateY(-1px); }
      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .app {
        height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 10px 18px;
        background: #ffffff;
        border-bottom: 1px solid var(--line);
      }

      .title {
        display: flex;
        align-items: baseline;
        gap: 10px;
        min-width: 220px;
      }

      .title h1 {
        margin: 0;
        font-size: 18px;
        line-height: 1.2;
      }

      .title span {
        color: var(--muted);
        font-size: 13px;
      }

      .controls {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .speed.active,
      #pauseBtn.active {
        color: #fff;
        background: var(--dark);
        border-color: var(--dark);
      }

      .primary {
        color: #fff;
        background: var(--accent);
        border-color: var(--accent);
      }

      .ghost {
        background: #f7f9fc;
      }

      .battle {
        display: grid;
        grid-template-rows: minmax(0, 1fr) 2px minmax(0, 1fr);
        min-height: 0;
      }

      .divider {
        background: #777d84;
      }

      .field {
        min-height: 0;
        display: grid;
        gap: 18px;
        padding: 18px;
        align-items: stretch;
        overflow: hidden;
      }

      .field.enemy {
        grid-template-columns: minmax(420px, 1fr) 300px;
      }

      .field.player {
        grid-template-columns: 300px minmax(420px, 1fr);
      }

      .left-zone,
      .right-zone,
      .center-zone {
        min-width: 0;
        min-height: 0;
        display: grid;
        gap: 12px;
      }

      .field.enemy .left-zone {
        grid-template-rows: auto auto minmax(86px, 1fr);
        align-content: stretch;
      }

      .field.player .right-zone {
        grid-template-rows: auto auto minmax(86px, 0.9fr) minmax(0, 1fr);
        align-content: stretch;
      }

      .field.enemy .right-zone {
        grid-template-rows: minmax(96px, auto) minmax(112px, 1fr) auto;
        align-content: stretch;
      }

      .field.player .left-zone {
        grid-template-rows: minmax(96px, auto) minmax(112px, 1fr) auto auto;
        align-content: stretch;
      }

      .slot-label,
      .pile-label {
        font-size: 20px;
        font-weight: 900;
        color: var(--accent);
        line-height: 1;
      }

      .weapon-effect {
        min-height: 54px;
        border: 2px solid #cbd5e1;
        border-left: 6px solid var(--dark);
        background: #ffffff;
        border-radius: 6px;
        padding: 8px 10px;
        display: grid;
        gap: 4px;
        align-content: center;
        overflow: hidden;
        transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
      }

      .weapon-effect-title {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        font-size: 13px;
        line-height: 1.15;
        font-weight: 900;
      }

      .weapon-effect-body {
        color: #526174;
        font-size: 12px;
        line-height: 1.25;
        font-weight: 700;
        overflow-wrap: anywhere;
      }

      .slot-row {
        display: grid;
        grid-template-columns: repeat(5, minmax(78px, 1fr));
        gap: 10px;
        align-items: stretch;
        min-height: 0;
      }

      .slot {
        min-height: 86px;
        border: 3px solid var(--slot-line);
        background: var(--slot);
        border-radius: 4px;
        display: flex;
        align-items: stretch;
        justify-content: stretch;
        overflow: hidden;
        transition: border-color 180ms ease, background 180ms ease, box-shadow 180ms ease, transform 180ms ease;
      }

      .slot.empty {
        background:
          linear-gradient(135deg, rgba(232,167,143,0.08), rgba(255,255,255,0.2));
      }

      .slot.disabled {
        opacity: 0.18;
      }

      .unit-row {
        display: grid;
        grid-template-columns: 1fr 110px;
        gap: 12px;
        align-items: stretch;
        min-height: 0;
      }

      .field.player .unit-row {
        grid-template-columns: 110px 1fr;
      }

      .portrait {
        border-radius: 18px;
        background: var(--enemy);
        min-height: 96px;
        display: grid;
        place-items: center;
        color: #fff;
        font-size: 20px;
        font-weight: 900;
        text-align: center;
        padding: 14px;
        position: relative;
        transition: transform 180ms ease, filter 180ms ease;
      }

      .field.player .portrait {
        background: var(--player);
      }

      .unit-panel {
        min-width: 0;
        display: grid;
        gap: 8px;
        align-content: center;
      }

      .name-line {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        font-weight: 900;
      }

      .sub {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .hpbar {
        height: 20px;
        border-radius: 4px;
        background: #e6ebf3;
        overflow: hidden;
        border: 1px solid #c8d0dd;
      }

      .hpfill {
        height: 100%;
        background: linear-gradient(90deg, #36b37e, #9fd356);
        width: 100%;
        transition: width 420ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .hptext {
        font-size: 12px;
        font-weight: 900;
      }

      .statuses {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        min-height: 25px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        min-height: 22px;
        padding: 0 7px;
        border-radius: 999px;
        color: #fff;
        background: #596579;
        font-size: 12px;
        font-weight: 800;
        cursor: pointer;
        transition: transform 160ms ease, filter 160ms ease;
      }

      .chip.good { background: var(--accent-2); }
      .chip.bad { background: #d35f5f; }

      .keyword-term {
        color: #101823;
        font-weight: 900;
        border-bottom: 1px dotted #526174;
        cursor: pointer;
      }

      .card-ref {
        color: #b8444f;
        font-weight: 900;
        border-bottom: 1px dotted #b8444f;
        cursor: pointer;
      }

      .game-tooltip {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 1000;
        max-width: 280px;
        padding: 8px 10px;
        border-radius: 6px;
        background: #101823;
        color: #fff;
        font-size: 12px;
        line-height: 1.35;
        font-weight: 700;
        box-shadow: 0 10px 28px rgba(16, 24, 35, 0.22);
        pointer-events: none;
        opacity: 0;
        transform: translate(-999px, -999px);
        transition: opacity 120ms ease, transform 120ms ease;
      }

      .game-tooltip.show {
        opacity: 1;
      }

      .game-tooltip.pinned {
        pointer-events: auto;
      }

      .tooltip-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-bottom: 4px;
        font-weight: 900;
      }

      .tooltip-close {
        border: 0;
        min-height: 0;
        width: 22px;
        height: 22px;
        padding: 0;
        background: rgba(255, 255, 255, 0.16);
        color: #fff;
        border-radius: 4px;
        line-height: 1;
      }

      .tooltip-body {
        color: #eef4ff;
      }

      .card-viewer {
        position: fixed;
        inset: 0;
        z-index: 950;
        display: none;
        background: rgba(16, 24, 35, 0.42);
        padding: 36px;
      }

      .card-viewer.show {
        display: grid;
        place-items: center;
      }

      .card-viewer-panel {
        width: min(820px, calc(100vw - 36px));
        max-height: min(680px, calc(100vh - 36px));
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 20px 56px rgba(16, 24, 35, 0.28);
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        overflow: hidden;
        animation: modalIn 180ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .card-viewer-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
        font-weight: 900;
      }

      .card-viewer-close {
        min-height: 30px;
        width: 32px;
        padding: 0;
      }

      .card-viewer-body {
        overflow: auto;
        padding: 12px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 10px;
        align-content: start;
      }

      .viewer-card {
        border: 2px solid var(--slot-line);
        border-radius: 6px;
        background: #fff;
        padding: 8px;
        min-height: 128px;
        display: grid;
        gap: 4px;
        align-content: start;
        animation: cardIn 180ms ease both;
      }

      .viewer-card-name {
        font-weight: 900;
      }

      .viewer-card-meta {
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
      }

      .viewer-empty {
        color: var(--muted);
        font-weight: 800;
      }

      .draw-area {
        display: grid;
        grid-template-columns: 1fr 66px 66px;
        gap: 10px;
        align-items: stretch;
        min-height: 0;
      }

      .draw-area > div:first-child {
        min-height: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
      }

      .current-card-box,
      .pile {
        border: 3px solid var(--slot-line);
        background: #fff;
        border-radius: 4px;
        min-height: 0;
      }

      .current-card-box {
        overflow: hidden;
        transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
      }

      .pile {
        display: grid;
        place-items: center;
        text-align: center;
        color: var(--accent);
        font-weight: 900;
        font-size: 13px;
        padding: 6px;
        cursor: pointer;
        transition: background 160ms ease, transform 160ms ease, box-shadow 160ms ease;
      }

      .pile:hover {
        background: #fff8f4;
        transform: translateY(-1px);
      }

      .pile strong {
        display: block;
        color: var(--ink);
        font-size: 22px;
      }

      .timer {
        height: 22px;
        background: #f05c65;
        border-radius: 2px;
        overflow: hidden;
      }

      .timer-fill {
        height: 100%;
        background: #ffd166;
        transform-origin: left center;
        transform: scaleX(1);
        transition: transform 120ms linear;
      }

      .card {
        width: 100%;
        min-height: 100%;
        padding: 8px;
        display: grid;
        grid-template-rows: auto auto 1fr auto;
        gap: 4px;
        background: #fff;
        border-left: 5px solid #9aa8bd;
        transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
      }

      .card.action { border-left-color: #e8a78f; }
      .card.spell { border-left-color: #6e98e6; }
      .card .card-name {
        font-size: 14px;
        font-weight: 900;
        line-height: 1.15;
      }

      .card .card-type,
      .card .card-tags {
        color: var(--muted);
        font-size: 11px;
        line-height: 1.15;
        font-weight: 800;
      }

      .card .card-desc {
        font-size: 12px;
        line-height: 1.25;
        overflow-wrap: anywhere;
      }

      .decision {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .log {
        height: 100%;
        min-height: 0;
        overflow: auto;
        border-left: 1px solid var(--line);
        padding-left: 12px;
        color: #334155;
        font-size: 12px;
        line-height: 1.35;
      }

      .log p {
        margin: 0 0 6px;
      }

      .log p:first-child {
        animation: logIn 260ms ease both;
      }

      .anim-draw {
        animation: cardDraw 360ms cubic-bezier(0.22, 1, 0.36, 1);
        box-shadow: 0 10px 22px rgba(46, 68, 99, 0.18);
      }

      .anim-play {
        animation: cardPlay 240ms ease;
      }

      .anim-slot-pop {
        animation: slotPop 360ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .anim-slot-resolve {
        animation: slotResolve 560ms ease;
      }

      .anim-pile {
        animation: pilePulse 280ms ease;
      }

      .anim-status {
        animation: statusPop 300ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .anim-hit {
        animation: hitShake 260ms ease;
      }

      .anim-heal {
        animation: healPulse 360ms ease;
      }

      .anim-weapon {
        animation: weaponPulse 520ms ease;
      }

      .float-text {
        position: fixed;
        z-index: 900;
        pointer-events: none;
        font-weight: 1000;
        font-size: 18px;
        text-shadow: 0 2px 0 rgba(255, 255, 255, 0.8);
        animation: floatUp 900ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      .float-text.damage { color: #d9424f; }
      .float-text.heal { color: #2e9d83; }
      .float-text.status { color: #26313f; font-size: 14px; }

      @keyframes cardDraw {
        0% { opacity: 0; transform: translateY(18px) scale(0.96); filter: blur(2px); }
        70% { opacity: 1; transform: translateY(-2px) scale(1.01); filter: blur(0); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
      }

      @keyframes cardPlay {
        0% { transform: scale(1); }
        45% { transform: translateY(-7px) scale(1.035); box-shadow: 0 12px 24px rgba(239, 93, 103, 0.18); }
        100% { transform: scale(1); }
      }

      @keyframes slotPop {
        0% { transform: scale(0.96); border-color: #ffd166; box-shadow: 0 0 0 rgba(255, 209, 102, 0); }
        45% { transform: scale(1.025); border-color: #ffd166; box-shadow: 0 0 0 5px rgba(255, 209, 102, 0.22); }
        100% { transform: scale(1); }
      }

      @keyframes slotResolve {
        0% { transform: scale(1); border-color: var(--slot-line); }
        38% { transform: translateY(-3px) scale(1.018); border-color: #ef5d67; box-shadow: 0 8px 18px rgba(239, 93, 103, 0.18); }
        100% { transform: scale(1); }
      }

      @keyframes pilePulse {
        0% { transform: scale(1); }
        45% { transform: scale(1.045); box-shadow: 0 0 0 4px rgba(232, 167, 143, 0.18); }
        100% { transform: scale(1); }
      }

      @keyframes statusPop {
        0% { transform: scale(0.86); filter: brightness(1.25); }
        60% { transform: scale(1.12); }
        100% { transform: scale(1); filter: brightness(1); }
      }

      @keyframes hitShake {
        0%, 100% { transform: translateX(0); filter: brightness(1); }
        20% { transform: translateX(-4px); filter: brightness(1.12); }
        45% { transform: translateX(4px); }
        70% { transform: translateX(-2px); }
      }

      @keyframes healPulse {
        0% { transform: scale(1); filter: brightness(1); }
        45% { transform: scale(1.035); filter: brightness(1.18); }
        100% { transform: scale(1); filter: brightness(1); }
      }

      @keyframes weaponPulse {
        0% { transform: scale(1); border-left-color: var(--dark); }
        35% { transform: scale(1.012); border-left-color: #ffd166; box-shadow: 0 8px 20px rgba(255, 209, 102, 0.22); }
        100% { transform: scale(1); }
      }

      @keyframes floatUp {
        0% { opacity: 0; transform: translate(-50%, 10px) scale(0.92); }
        18% { opacity: 1; transform: translate(-50%, -4px) scale(1.06); }
        100% { opacity: 0; transform: translate(-50%, -42px) scale(1); }
      }

      @keyframes logIn {
        0% { opacity: 0; transform: translateY(-5px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      @keyframes modalIn {
        0% { opacity: 0; transform: translateY(12px) scale(0.985); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
      }

      @keyframes cardIn {
        0% { opacity: 0; transform: translateY(8px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      .winner {
        position: fixed;
        inset: auto 18px 18px auto;
        max-width: min(420px, calc(100vw - 36px));
        background: #17202a;
        color: #fff;
        border-radius: 8px;
        padding: 14px 16px;
        box-shadow: 0 16px 40px rgba(17, 24, 39, 0.22);
        font-weight: 900;
        display: none;
      }

      .winner.show { display: block; }

      .import-note {
        color: var(--muted);
        font-size: 12px;
        min-width: 150px;
        text-align: right;
      }

      #fileInput { display: none; }

      @media (max-width: 900px) {
        body { overflow: auto; }
        .app { height: auto; min-height: 100vh; }
        .battle { grid-template-rows: auto 2px auto; }
        .field.enemy,
        .field.player {
          grid-template-columns: 1fr;
        }
        .field.player .left-zone { order: 2; }
        .field.player .right-zone { order: 1; }
        .slot-row { grid-template-columns: repeat(3, minmax(82px, 1fr)); }
        .topbar { align-items: flex-start; flex-direction: column; }
        .controls { justify-content: flex-start; }
        .log { max-height: 150px; border-left: 0; padding-left: 0; border-top: 1px solid var(--line); padding-top: 10px; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="title">
          <h1>Fight 002</h1>
          <span id="battleSeed">武器槽位 + 手动打牌</span>
        </div>
        <div class="controls">
          <button class="speed active" data-speed="0.1">0.1x</button>
          <button class="speed" data-speed="0.5">0.5x</button>
          <button class="speed" data-speed="1">1x</button>
          <button class="speed" data-speed="2">2x</button>
          <button class="speed" data-speed="3">3x</button>
          <button class="speed" data-speed="5">5x</button>
          <button class="speed" data-mode="turn">回合制</button>
          <button id="pauseBtn">暂停</button>
          <button id="importBtn" class="ghost">导入数据</button>
          <button id="newBattleBtn" class="primary">新战斗</button>
          <span class="import-note" id="importState">内置数据</span>
        </div>
      </header>

      <main class="battle">
        <section class="field enemy" id="enemyField">
          <div class="left-zone">
            <div class="slot-label">敌方槽位区</div>
            <div class="weapon-effect" id="enemyWeaponEffect"></div>
            <div class="slot-row" id="enemySlots"></div>
          </div>
          <div class="right-zone">
            <div class="unit-row">
              <div class="unit-panel" id="enemyUnit"></div>
              <div class="portrait" id="enemyPortrait">ENEMY</div>
            </div>
            <div class="draw-area">
              <div>
                <div class="pile-label">当前抽牌</div>
                <div class="current-card-box" id="enemyCurrent"></div>
              </div>
              <div class="pile" id="enemyDeck" data-side="enemy" data-pile="deck"></div>
              <div class="pile" id="enemyDiscard" data-side="enemy" data-pile="discard"></div>
            </div>
            <div class="timer"><div class="timer-fill" id="enemyTimer"></div></div>
          </div>
        </section>

        <div class="divider"></div>

        <section class="field player" id="playerField">
          <div class="left-zone">
            <div class="unit-row">
              <div class="portrait" id="playerPortrait">PLAYER</div>
              <div class="unit-panel" id="playerUnit"></div>
            </div>
            <div class="draw-area">
              <div>
                <div class="pile-label">当前抽牌</div>
                <div class="current-card-box" id="playerCurrent"></div>
              </div>
              <div class="pile" id="playerDeck" data-side="player" data-pile="deck"></div>
              <div class="pile" id="playerDiscard" data-side="player" data-pile="discard"></div>
            </div>
            <div class="decision">
              <button id="playBtn" class="primary">打出</button>
              <button id="skipBtn">跳过</button>
            </div>
            <div class="timer"><div class="timer-fill" id="playerTimer"></div></div>
          </div>
          <div class="right-zone">
            <div class="slot-label">玩家槽位区</div>
            <div class="weapon-effect" id="playerWeaponEffect"></div>
            <div class="slot-row" id="playerSlots"></div>
            <div class="log" id="battleLog"></div>
          </div>
        </section>
      </main>
    </div>

    <div class="winner" id="winner"></div>
    <div class="game-tooltip" id="gameTooltip"></div>
    <div class="card-viewer" id="cardViewer">
      <div class="card-viewer-panel">
        <div class="card-viewer-head">
          <span id="cardViewerTitle">牌堆</span>
          <button class="card-viewer-close" id="cardViewerClose" type="button">×</button>
        </div>
        <div class="card-viewer-body" id="cardViewerBody"></div>
      </div>
    </div>
    <input id="fileInput" type="file" accept=".xlsx" multiple />

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="./data/game_data.js"></script>
    <script>
      const state = {
        data: window.BATTLE_DATA,
        cards: new Map(),
        cardsByName: new Map(),
        cardNameTerms: [],
        weapons: new Map(),
        keywords: new Map(),
        keywordTerms: [],
        config: {},
        fighters: [],
        speed: 0.1,
        mode: "realtime",
        paused: false,
        winner: null,
        last: performance.now(),
        log: [],
        battleNo: 1
      };

      const $ = (id) => document.getElementById(id);
      const statusNames = {
        charge: "蓄力",
        block: "格挡",
        vulnerable: "易伤",
        bleed: "流血",
        burn: "燃烧",
        poison: "中毒",
        slow: "迟缓",
        haste: "急速",
        spellPower: "法强",
        weaponPower: "附魔"
      };

      const statusDescriptions = {
        block: "抵消即将受到的伤害。",
        spellPower: "提高下一张法术造成的伤害，生效后消耗。",
        weaponPower: "提高下一次武器攻击伤害，生效后消耗。"
      };

      const statusKeywordNames = {
        charge: "蓄力",
        vulnerable: "易伤",
        bleed: "流血",
        burn: "燃烧",
        poison: "中毒",
        slow: "迟缓",
        haste: "急速"
      };

      function normalizeData(raw) {
        state.data = raw;
        state.cards = new Map(raw.cards.map((card) => [card.CardID, card]));
        state.cardsByName = new Map(raw.cards.map((card) => [card.Name, card]));
        state.cardNameTerms = [...state.cardsByName.keys()].sort((a, b) => b.length - a.length);
        state.weapons = new Map(raw.weapons.map((weapon) => [weapon.WeaponID, weapon]));
        state.keywords = new Map(raw.keywords.map((keyword) => [keyword.Name, keyword]));
        state.keywordTerms = [...state.keywords.keys()].sort((a, b) => b.length - a.length);
        state.config = Object.fromEntries(raw.config.map((item) => [item.Key, Number(item.Value)]));
      }

      function cloneCard(cardId, owner, index) {
        const base = state.cards.get(cardId);
        return { ...base, uid: `${owner}-${cardId}-${index}-${Math.random().toString(16).slice(2)}` };
      }

      function setHtml(id, html) {
        const element = $(id);
        if (element.dataset.htmlCache === html) return;
        element.innerHTML = html;
        element.dataset.htmlCache = html;
      }

      function replayAnimation(element, className, duration = 700) {
        if (!element) return;
        element.classList.remove(className);
        void element.offsetWidth;
        element.classList.add(className);
        window.setTimeout(() => element.classList.remove(className), duration);
      }

      function animateId(id, className, duration) {
        requestAnimationFrame(() => {
          render();
          replayAnimation($(id), className, duration);
        });
      }

      function animateSelector(selector, className, duration) {
        requestAnimationFrame(() => {
          render();
          const element = document.querySelector(selector);
          replayAnimation(element, className, duration);
        });
      }

      function sidePrefix(fighter) {
        return fighter.isPlayer ? "player" : "enemy";
      }

      function pileId(fighter, pileName) {
        const prefix = sidePrefix(fighter);
        return `${prefix}${pileName === "deck" ? "Deck" : "Discard"}`;
      }

      function animatePile(fighter, pileName) {
        animateId(pileId(fighter, pileName), "anim-pile", 320);
      }

      function animateCurrent(fighter, kind = "anim-draw") {
        animateSelector(`#${sidePrefix(fighter)}Current .card`, kind, 420);
      }

      function animateSlot(fighter, index, className = "anim-slot-pop", duration = 520) {
        const slotIndex = Math.max(0, index) + 1;
        animateSelector(`#${sidePrefix(fighter)}Slots .slot:nth-child(${slotIndex})`, className, duration);
      }

      function animateWeapon(fighter) {
        animateId(`${sidePrefix(fighter)}WeaponEffect`, "anim-weapon", 560);
      }

      function animateUnit(fighter, className) {
        animateId(`${sidePrefix(fighter)}Portrait`, className, 520);
      }

      function animateStatuses(fighter) {
        requestAnimationFrame(() => {
          render();
          document.querySelectorAll(`#${sidePrefix(fighter)}Unit .chip`).forEach((chip) => replayAnimation(chip, "anim-status", 360));
        });
      }

      function spawnFloat(fighter, text, type = "damage") {
        requestAnimationFrame(() => {
          const anchor = $(`${sidePrefix(fighter)}Portrait`) || $(`${sidePrefix(fighter)}Unit`);
          if (!anchor) return;
          const rect = anchor.getBoundingClientRect();
          const float = document.createElement("div");
          float.className = `float-text ${type}`;
          float.textContent = text;
          float.style.left = `${rect.left + rect.width / 2}px`;
          float.style.top = `${rect.top + rect.height * 0.35}px`;
          document.body.appendChild(float);
          window.setTimeout(() => float.remove(), 980);
        });
      }

      function shuffle(list) {
        const out = list.slice();
        for (let i = out.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [out[i], out[j]] = [out[j], out[i]];
        }
        return out;
      }

      function buildDeck(character) {
        const cards = [];
        let index = 0;
        Object.entries(character.DeckList).forEach(([cardId, count]) => {
          for (let i = 0; i < Number(count); i += 1) {
            cards.push(cloneCard(cardId, character.CharacterID, index));
            index += 1;
          }
        });
        return shuffle(cards);
      }

      function createFighter(character, side) {
        const weapon = state.weapons.get(character.WeaponID);
        return {
          side,
          isPlayer: side === "player",
          character,
          weapon,
          hp: Number(character.HP),
          maxHp: Number(character.HP),
          deck: buildDeck(character),
          discard: [],
          exhausted: [],
          slots: [],
          current: null,
          phase: "draw",
          timer: 0,
          timerMax: 1,
          statuses: { charge: 0, block: 0, vulnerable: 0, bleed: 0, burn: 0, poison: 0, slow: 0, haste: 0, spellPower: 0, weaponPower: 0 },
          finalAttackBonus: 0,
          damageDone: 0
        };
      }

      function startBattle() {
        normalizeData(state.data);
        const pool = shuffle(state.data.characters);
        const player = createFighter(pool[0], "player");
        const enemy = createFighter(pool[1], "enemy");
        state.fighters = [player, enemy];
        state.winner = null;
        state.paused = false;
        state.log = [];
        $("winner").classList.remove("show");
        $("pauseBtn").classList.remove("active");
        $("pauseBtn").textContent = "暂停";
        log(`第 ${state.battleNo} 场：${player.character.Name} VS ${enemy.character.Name}`);
        state.battleNo += 1;
        state.fighters.forEach(startDraw);
        render();
      }

      function log(text) {
        state.log.unshift(`<p>${renderLogText(text)}</p>`);
        state.log = state.log.slice(0, 90);
      }

      function cardTooltip(card) {
        const tags = [card.Type, card.Archetype, card.Keywords, card.Tags].filter(Boolean).join(" · ");
        return `${card.Name}\n${tags}\n${card.Description}`;
      }

      function renderLogText(value) {
        const text = String(value ?? "");
        if (!text || !state.cardNameTerms.length) return escapeHtml(text);
        const pattern = new RegExp(`(${state.cardNameTerms.map(escapeRegExp).join("|")})`, "g");
        return text.split(pattern).map((part) => {
          const card = state.cardsByName.get(part);
          if (!card) return escapeHtml(part);
          return `<span class="card-ref" data-tooltip="${escapeHtml(cardTooltip(card))}">${escapeHtml(part)}</span>`;
        }).join("");
      }

      function enemyOf(fighter) {
        return state.fighters.find((item) => item !== fighter);
      }

      function config(key, fallback) {
        return Number.isFinite(state.config[key]) ? state.config[key] : fallback;
      }

      function consumeTimeMods(fighter, base, kind) {
        let time = base;
        if (fighter.statuses.slow > 0) {
          time += fighter.statuses.slow * config("SlowPenaltyT", 0.2);
          fighter.statuses.slow = Math.max(0, fighter.statuses.slow - 1);
        }
        if (kind === "draw" && fighter.statuses.haste > 0) {
          time = Math.max(0.2, time - fighter.statuses.haste * config("HasteDiscountT", 0.15));
          fighter.statuses.haste = Math.max(0, fighter.statuses.haste - 1);
        }
        return time;
      }

      function setPhase(fighter, phase, time) {
        fighter.phase = phase;
        fighter.timer = Math.max(0.01, time);
        fighter.timerMax = fighter.timer;
      }

      function startDraw(fighter) {
        if (state.winner) return;
        fighter.current = null;
        setPhase(fighter, "draw", consumeTimeMods(fighter, config("DrawTimeT", 1), "draw"));
      }

      function startShuffle(fighter) {
        fighter.current = null;
        setPhase(fighter, "shuffle", config("ShuffleTimeT", 1));
        animatePile(fighter, "discard");
        animatePile(fighter, "deck");
        log(`${fighter.character.Name} 开始洗牌`);
      }

      function drawCard(fighter) {
        if (fighter.deck.length === 0) {
          if (fighter.discard.length > 0) {
            startShuffle(fighter);
          }
          return null;
        }
        return fighter.deck.pop();
      }

      function finishDraw(fighter) {
        const card = drawCard(fighter);
        if (!card) return;
        fighter.current = card;
        setPhase(fighter, "decision", consumeTimeMods(fighter, config("DrawTimeT", 1), "draw"));
        animatePile(fighter, "deck");
        animateCurrent(fighter, "anim-draw");
        log(`${fighter.character.Name} 抽到 ${card.Name}`);
      }

      function finishShuffle(fighter) {
        fighter.deck = shuffle(fighter.discard);
        fighter.discard = [];
        animatePile(fighter, "deck");
        log(`${fighter.character.Name} 洗牌完成，抽牌堆 ${fighter.deck.length} 张`);
        startDraw(fighter);
      }

      function finishAttack(fighter) {
        const multi = 1 + fighter.finalAttackBonus;
        fighter.finalAttackBonus = 0;
        weaponAttack(fighter, multi, "武器攻击");
        if (!state.winner) startDraw(fighter);
      }

      function updateFighter(fighter, dt) {
        if (state.winner) return;
        if (fighter.phase === "draw" || fighter.phase === "shuffle" || fighter.phase === "attacking" || fighter.phase === "decision") {
          fighter.timer -= dt;
          if (fighter.timer <= 0) {
            if (fighter.phase === "draw") finishDraw(fighter);
            else if (fighter.phase === "shuffle") finishShuffle(fighter);
            else if (fighter.phase === "attacking") finishAttack(fighter);
            else finishDecision(fighter);
          }
        }
      }

      function finishDecision(fighter) {
        if (!fighter.current || state.winner) return;
        if (fighter.isPlayer) {
          log(`${fighter.character.Name} 决策超时，自动打出 ${fighter.current.Name}`);
          playCurrent(fighter);
          return;
        }
        decideEnemy(fighter);
      }

      function continueNextDraw(fighter, remainingTime) {
        if (state.winner || fighter.phase !== "decision") return;
        if (remainingTime > 0.01) {
          fighter.phase = "draw";
          fighter.timer = remainingTime;
        } else {
          finishDraw(fighter);
        }
      }

      function shouldEnemyPlay(fighter, card) {
        if (card.Type === "法术") {
          if (card.Name === "治疗术" && fighter.hp > fighter.maxHp * 0.75) return false;
          if (card.Name === "净化" && fighter.statuses.bleed + fighter.statuses.burn + fighter.statuses.poison === 0) return false;
          return true;
        }
        if (fighter.slots.length >= Number(fighter.weapon.SlotCount)) return false;
        if (card.Name === "偷袭" && fighter.statuses.charge >= 2 && fighter.slots.length + 1 >= Number(fighter.weapon.SlotCount)) return false;
        return true;
      }

      function decideEnemy(fighter) {
        const card = fighter.current;
        if (!card) return;
        if (shouldEnemyPlay(fighter, card)) {
          playCurrent(fighter);
        } else {
          skipCurrent(fighter);
        }
      }

      function cardKeywords(card) {
        return String(card.Keywords || "").split(";").filter(Boolean);
      }

      function cardTags(card) {
        return String(card.Tags || "").split(";").filter(Boolean);
      }

      function hasKeyword(card, keyword) {
        return cardKeywords(card).includes(keyword);
      }

      function hasAttack(card) {
        return (card.Effects || []).some((fx) => ["weapon_attack", "finisher"].includes(fx.op));
      }

      function moveAfterUse(fighter, card) {
        if (hasKeyword(card, "消耗")) {
          fighter.exhausted.push(card);
        } else {
          fighter.discard.push(card);
          animatePile(fighter, "discard");
        }
      }

      function playCurrent(fighter) {
        const card = fighter.current;
        if (!card || state.winner) return;
        const remainingTime = fighter.phase === "decision" ? Math.max(0, fighter.timer) : config("DrawTimeT", 1);
        animateCurrent(fighter, "anim-play");
        fighter.current = null;
        playCard(fighter, card);
        continueNextDraw(fighter, remainingTime);
      }

      function skipCurrent(fighter) {
        const card = fighter.current;
        if (!card || state.winner) return;
        const remainingTime = fighter.phase === "decision" ? Math.max(0, fighter.timer) : config("DrawTimeT", 1);
        animateCurrent(fighter, "anim-play");
        fighter.current = null;
        fighter.discard.push(card);
        animatePile(fighter, "discard");
        log(`${fighter.character.Name} 跳过 ${card.Name}`);
        continueNextDraw(fighter, remainingTime);
      }

      function playCard(fighter, card) {
        log(`${fighter.character.Name} 打出 ${card.Name}`);
        if (card.Type === "法术") {
          animateWeapon(fighter);
          resolveEffects(fighter, card);
          moveAfterUse(fighter, card);
          return;
        }
        if (fighter.slots.length >= Number(fighter.weapon.SlotCount)) {
          fighter.discard.push(card);
          animatePile(fighter, "discard");
          log(`${fighter.character.Name} 槽位已满，${card.Name} 进入弃牌堆`);
          return;
        }
        let slotIndex = fighter.slots.length;
        if (hasKeyword(card, "沉稳")) {
          fighter.slots.unshift(card);
          slotIndex = 0;
        } else {
          fighter.slots.push(card);
        }
        animateSlot(fighter, slotIndex, "anim-slot-pop", 420);
        if (fighter.slots.length >= Number(fighter.weapon.SlotCount)) {
          resolveSlots(fighter);
        }
      }

      function resolveSlots(fighter) {
        const cards = fighter.slots.slice(0, Number(fighter.weapon.SlotCount));
        fighter.slots = fighter.slots.slice(Number(fighter.weapon.SlotCount));
        let repeatMode = 1;
        cards.forEach((_, index) => {
          window.setTimeout(() => animateSlot(fighter, index, "anim-slot-resolve", 620), index * 90);
        });
        animateWeapon(fighter);
        log(`${fighter.character.Name} 武器充能完毕，开始按槽位结算`);
        for (const card of cards) {
          const repeats = repeatMode > 1 && !hasAttack(card) ? repeatMode : 1;
          for (let i = 0; i < repeats; i += 1) {
            resolveEffects(fighter, card);
          }
          if (hasAttack(card) && repeatMode > 1) {
            repeatMode = 1;
          }
          const repeatFx = (card.Effects || []).find((fx) => fx.op === "repeat_next_actions");
          if (repeatFx) {
            repeatMode = Math.max(repeatMode, Number(repeatFx.times || 2));
          }
          moveAfterUse(fighter, card);
          if (state.winner) return;
        }
        setPhase(fighter, "attacking", consumeTimeMods(fighter, Number(fighter.weapon.AttackTimeT), "attack"));
      }

      function resolveEffects(fighter, card) {
        const effects = card.Effects || [];
        for (const fx of effects) {
          if (state.winner) return;
          switch (fx.op) {
            case "gain_charge":
              addStatus(fighter, "charge", fx.amount);
              break;
            case "gain_block":
              addStatus(fighter, "block", fx.amount);
              break;
            case "damage":
              dealDamage(fighter, enemyOf(fighter), spellDamage(fighter, card, Number(fx.amount)), card.Name);
              break;
            case "heal":
              fighter.hp = Math.min(fighter.maxHp, fighter.hp + Number(fx.amount));
              animateUnit(fighter, "anim-heal");
              spawnFloat(fighter, `+${Number(fx.amount).toFixed(0)}`, "heal");
              log(`${fighter.character.Name} 回复 ${Number(fx.amount).toFixed(0)} 点生命`);
              break;
            case "apply_status":
              addStatus(fx.target === "enemy" ? enemyOf(fighter) : fighter, fx.status, fx.amount);
              break;
            case "weapon_attack":
              weaponAttack(fighter, Number(fx.multiplier), card.Name);
              break;
            case "draw":
              bonusDraw(fighter, Number(fx.amount));
              break;
            case "inhale":
              inhale(fighter, fx);
              break;
            case "filter_draw":
              filterDraw(fighter, fx);
              break;
            case "repeat_next_actions":
              break;
            case "bleed_strike":
              dealDamage(fighter, enemyOf(fighter), Math.min(30, enemyOf(fighter).statuses.bleed * Number(fx.per)), card.Name);
              break;
            case "ignite":
              dealDamage(fighter, enemyOf(fighter), enemyOf(fighter).statuses.burn * Number(fx.per), card.Name);
              enemyOf(fighter).statuses.burn = 0;
              break;
            case "poison_burst":
              dealDamage(fighter, enemyOf(fighter), enemyOf(fighter).statuses.poison * Number(fx.per), card.Name);
              enemyOf(fighter).statuses.poison = 0;
              break;
            case "if_enemy_status":
              if (enemyOf(fighter).statuses[fx.status] > 0) runConditional(fighter, fx);
              break;
            case "if_self_status":
              if (fighter.statuses[fx.status] > 0) runConditional(fighter, fx);
              break;
            case "if_slots_at_least":
              if (fighter.slots.length >= Number(fx.count)) runConditional(fighter, fx);
              break;
            case "gain_spell_power":
              addStatus(fighter, "spellPower", fx.amount);
              break;
            case "weapon_power":
              addStatus(fighter, "weaponPower", fx.amount);
              break;
            case "final_attack_bonus":
              fighter.finalAttackBonus += Number(fx.amount);
              break;
            case "finisher":
              weaponAttack(fighter, fighter.statuses.charge >= Number(fx.need) ? Number(fx.high) : Number(fx.low), card.Name);
              break;
            case "cleanse":
              fighter.statuses.bleed = 0;
              fighter.statuses.burn = 0;
              fighter.statuses.poison = 0;
              log(`${fighter.character.Name} 净化异常状态`);
              break;
            case "reshuffle_discard":
              fighter.deck = shuffle(fighter.deck.concat(fighter.discard));
              fighter.discard = [];
              log(`${fighter.character.Name} 将弃牌堆洗回抽牌堆`);
              break;
            case "discard_strike":
              dealDamage(fighter, enemyOf(fighter), Math.min(Number(fx.cap), fighter.discard.length), card.Name);
              break;
          }
        }
      }

      function runConditional(fighter, fx) {
        const fake = { Name: "条件效果", Type: "法术", Effects: [{ op: fx.op2, amount: fx.amount }] };
        resolveEffects(fighter, fake);
      }

      function addStatus(fighter, status, amount) {
        const value = Number(amount);
        fighter.statuses[status] = Math.max(0, (fighter.statuses[status] || 0) + value);
        const name = statusNames[status] || status;
        if (value !== 0) {
          log(`${fighter.character.Name} ${name}${value > 0 ? "+" : ""}${value}`);
          spawnFloat(fighter, `${name}${value > 0 ? "+" : ""}${value}`, "status");
          animateStatuses(fighter);
          animateWeapon(fighter);
        }
      }

      function spellDamage(fighter, card, amount) {
        if (card.Type !== "法术" || fighter.statuses.spellPower <= 0) return amount;
        const boosted = amount + fighter.statuses.spellPower;
        fighter.statuses.spellPower = 0;
        return boosted;
      }

      function weaponAttack(fighter, multiplier, source) {
        const weapon = fighter.weapon;
        const charge = fighter.statuses.charge;
        const weaponPower = fighter.statuses.weaponPower;
        const chargeBonus = Number(weapon.ChargeBonusPct || 0.2);
        const raw = Number(weapon.BaseDamage) * Number(multiplier) * (1 + charge * chargeBonus) * (1 + weaponPower);
        fighter.statuses.charge = 0;
        fighter.statuses.weaponPower = 0;
        if (Number(weapon.AfterAttackCharge) > 0) addStatus(fighter, "charge", Number(weapon.AfterAttackCharge));
        animateWeapon(fighter);
        dealDamage(fighter, enemyOf(fighter), raw, source);
      }

      function dealDamage(attacker, defender, amount, source) {
        let damage = Math.max(0, Number(amount));
        if (defender.statuses.vulnerable > 0) {
          damage *= 1 + defender.statuses.vulnerable * config("VulnerableBonusPct", 0.25);
          defender.statuses.vulnerable = Math.max(0, defender.statuses.vulnerable - 1);
        }
        const blocked = Math.min(defender.statuses.block, damage);
        defender.statuses.block -= blocked;
        damage -= blocked;
        damage = Math.max(0, damage);
        defender.hp = Math.max(0, defender.hp - damage);
        attacker.damageDone += damage;
        if (damage > 0) {
          animateUnit(defender, "anim-hit");
          spawnFloat(defender, `-${damage.toFixed(1)}`, "damage");
        } else if (blocked > 0) {
          spawnFloat(defender, `格挡 ${blocked.toFixed(1)}`, "status");
          animateStatuses(defender);
        }
        log(`${attacker.character.Name} 的${source}造成 ${damage.toFixed(1)} 伤害${blocked > 0 ? `（格挡${blocked.toFixed(1)}）` : ""}`);
        if (defender.hp <= 0) {
          state.winner = attacker;
          $("winner").textContent = `${attacker.character.Name} 胜利，总伤害 ${attacker.damageDone.toFixed(1)}`;
          $("winner").classList.add("show");
          log(`${attacker.character.Name} 获胜`);
        }
      }

      function drawImmediate(fighter) {
        if (fighter.deck.length === 0 && fighter.discard.length > 0) {
          fighter.deck = shuffle(fighter.discard);
          fighter.discard = [];
          animatePile(fighter, "deck");
          log(`${fighter.character.Name} 即时洗牌`);
        }
        return fighter.deck.pop() || null;
      }

      function bonusDraw(fighter, amount) {
        for (let i = 0; i < amount; i += 1) {
          const card = drawImmediate(fighter);
          if (!card) return;
          animatePile(fighter, "deck");
          log(`${fighter.character.Name} 额外抽到 ${card.Name}`);
          if (card.Type === "法术" || (card.Type === "动作" && fighter.slots.length < Number(fighter.weapon.SlotCount))) {
            playCard(fighter, card);
          } else {
            fighter.discard.push(card);
            animatePile(fighter, "discard");
          }
        }
      }

      function inhale(fighter, fx) {
        const drawn = [];
        for (let i = 0; i < Number(fx.draw || 3); i += 1) {
          const card = drawImmediate(fighter);
          if (card) drawn.push(card);
        }
        const picked = drawn.find((card) => cardTags(card).includes(fx.tag));
        log(`${fighter.character.Name} 吸气抽到：${drawn.map((card) => card.Name).join("、") || "无"}`);
        drawn.forEach((card) => {
          if (card === picked) {
            playCard(fighter, card);
          } else {
            fighter.discard.push(card);
            animatePile(fighter, "discard");
          }
        });
      }

      function filterDraw(fighter, fx) {
        const drawn = [];
        for (let i = 0; i < Number(fx.draw || 2); i += 1) {
          const card = drawImmediate(fighter);
          if (card) drawn.push(card);
        }
        if (!drawn.length) return;
        const discard = drawn.find((card) => card.Type !== "动作") || drawn[drawn.length - 1];
        const kept = drawn.filter((card) => card !== discard);
        log(`${fighter.character.Name} 筛选抽到：${drawn.map((card) => card.Name).join("、")}；弃置 ${discard.Name}${kept.length ? `，打出 ${kept.map((card) => card.Name).join("、")}` : ""}`);
        drawn.forEach((card) => {
          if (card === discard) {
            fighter.discard.push(card);
            animatePile(fighter, "discard");
          } else playCard(fighter, card);
        });
      }

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        }[char]));
      }

      function escapeRegExp(value) {
        return String(value).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      }

      function keywordTitle(name) {
        const keyword = state.keywords.get(name);
        if (!keyword) return name;
        return `${keyword.Name}：${keyword.Description}`;
      }

      function renderKeywordText(value) {
        const text = String(value ?? "");
        if (!text || !state.keywordTerms.length) return escapeHtml(text);
        const pattern = new RegExp(`(${state.keywordTerms.map(escapeRegExp).join("|")})`, "g");
        return text.split(pattern).map((part) => {
          if (!part) return "";
          if (!state.keywords.has(part)) return escapeHtml(part);
          return `<span class="keyword-term" data-tooltip="${escapeHtml(keywordTitle(part))}">${escapeHtml(part)}</span>`;
        }).join("");
      }

      function renderKeywordList(value) {
        const items = String(value || "").split(";").filter(Boolean);
        if (!items.length) return "";
        return items.map((item) => {
          const title = state.keywords.has(item) ? keywordTitle(item) : item;
          return `<span class="keyword-term" data-tooltip="${escapeHtml(title)}">${escapeHtml(item)}</span>`;
        }).join("；");
      }

      function statusTitle(key) {
        const keywordName = statusKeywordNames[key];
        if (keywordName && state.keywords.has(keywordName)) return keywordTitle(keywordName);
        return `${statusNames[key] || key}：${statusDescriptions[key] || "临时战斗状态。"}`;
      }

      function cardHtml(card) {
        if (!card) return "";
        const typeClass = card.Type === "法术" ? "spell" : "action";
        const tags = card.Keywords || card.Tags || "";
        return `
          <div class="card ${typeClass}">
            <div class="card-name">${escapeHtml(card.Name)}</div>
            <div class="card-type">${renderKeywordText(`${card.Type} · ${card.Archetype || ""}`)}</div>
            <div class="card-desc">${renderKeywordText(card.Description)}</div>
            <div class="card-tags">${renderKeywordList(tags)}</div>
          </div>
        `;
      }

      function viewerCardHtml(card, index) {
        const tags = card.Keywords || card.Tags || "";
        return `
          <div class="viewer-card" data-tooltip="${escapeHtml(cardTooltip(card))}">
            <div class="viewer-card-name">${index + 1}. ${escapeHtml(card.Name)}</div>
            <div class="viewer-card-meta">${renderKeywordText(`${card.Type} · ${card.Archetype || ""}`)}</div>
            <div class="card-desc">${renderKeywordText(card.Description)}</div>
            <div class="card-tags">${renderKeywordList(tags)}</div>
          </div>
        `;
      }

      function renderSlots(fighter, id) {
        const slotCount = Number(fighter.weapon.SlotCount);
        let html = "";
        for (let i = 0; i < 5; i += 1) {
          if (i >= slotCount) {
            html += `<div class="slot disabled"></div>`;
          } else {
            const card = fighter.slots[i];
            html += `<div class="slot ${card ? "" : "empty"}">${cardHtml(card)}</div>`;
          }
        }
        setHtml(id, html);
      }

      function renderWeaponEffect(fighter, id) {
        const weapon = fighter.weapon;
        const charge = fighter.statuses.charge || 0;
        const chargeBonus = Number(weapon.ChargeBonusPct || 0);
        const baseDamage = Number(weapon.BaseDamage || 0);
        const previewDamage = baseDamage * (1 + charge * chargeBonus);
        const afterCharge = Number(weapon.AfterAttackCharge || 0);
        const bonusText = `${Math.round(chargeBonus * 100)}%`;
        const afterText = afterCharge > 0 ? `，攻击后获得蓄力${afterCharge}` : "";
        setHtml(id, `
          <div class="weapon-effect-title">
            <span>${escapeHtml(weapon.Name)} · ${weapon.SlotCount}槽</span>
            <span>当前预计 ${previewDamage.toFixed(1)}</span>
          </div>
          <div class="weapon-effect-body">
            ${renderKeywordText(`武器效果：槽满后按顺序触发动作牌，最后武器攻击造成${baseDamage}点基础伤害；每层蓄力+${bonusText}${afterText}。攻击时间${Number(weapon.AttackTimeT).toFixed(1)}T。`)}
          </div>
        `);
      }

      function renderUnit(fighter, id) {
        const hpPct = Math.max(0, Math.min(100, fighter.hp / fighter.maxHp * 100));
        const chips = Object.entries(fighter.statuses)
          .filter(([, value]) => Math.abs(value) > 0.001)
          .map(([key, value]) => {
            const good = ["charge", "block", "haste", "spellPower", "weaponPower"].includes(key);
            return `<span class="chip ${good ? "good" : "bad"}" data-tooltip="${escapeHtml(statusTitle(key))}">${statusNames[key] || key} ${Number(value).toFixed(value % 1 ? 1 : 0)}</span>`;
          }).join("");
        setHtml(id, `
          <div class="name-line">
            <span>${escapeHtml(fighter.character.Name)}</span>
            <span class="sub">${escapeHtml(fighter.character.Stage)}</span>
          </div>
          <div class="sub">${escapeHtml(fighter.weapon.Name)} · ${fighter.weapon.SlotCount}槽 · ${escapeHtml(fighter.character.AIStyle)}</div>
          <div class="hpbar"><div class="hpfill" style="width:${hpPct}%"></div></div>
          <div class="hptext">HP ${fighter.hp.toFixed(1)} / ${fighter.maxHp}</div>
          <div class="statuses">${chips}</div>
        `);
      }

      function renderPile(fighter, deckId, discardId) {
        setHtml(deckId, `抽牌堆<strong>${fighter.deck.length}</strong>`);
        setHtml(discardId, `弃牌堆<strong>${fighter.discard.length}</strong>`);
      }

      function fighterBySide(side) {
        return state.fighters.find((fighter) => fighter.side === side);
      }

      function openPileViewer(side, pileName) {
        const fighter = fighterBySide(side);
        if (!fighter) return;
        const isDeck = pileName === "deck";
        const cards = isDeck ? fighter.deck.slice().reverse() : fighter.discard.slice().reverse();
        const sideName = fighter.isPlayer ? "玩家" : "敌方";
        const pileTitle = isDeck ? "抽牌堆" : "弃牌堆";
        $("cardViewerTitle").textContent = `${sideName} ${pileTitle} · ${cards.length}张${isDeck ? " · 下一抽在最前" : " · 最新弃牌在最前"}`;
        setHtml("cardViewerBody", cards.length
          ? cards.map((card, index) => viewerCardHtml(card, index)).join("")
          : `<div class="viewer-empty">这里还没有牌。</div>`);
        $("cardViewer").classList.add("show");
      }

      function closePileViewer() {
        $("cardViewer").classList.remove("show");
      }

      function renderTimer(fighter, id) {
        const ratio = Math.max(0, Math.min(1, fighter.timer / fighter.timerMax));
        $(id).style.transform = `scaleX(${ratio})`;
      }

      function isTurnWaiting() {
        const player = state.fighters.find((f) => f.isPlayer);
        return state.mode === "turn" && player?.phase === "decision" && player.current && !state.winner;
      }

      function speedLabel() {
        if (state.mode === "turn") return isTurnWaiting() ? "回合制 · 等待选择" : "回合制 · 1x";
        return `${state.speed}x`;
      }

      function render() {
        const player = state.fighters.find((f) => f.isPlayer);
        const enemy = state.fighters.find((f) => !f.isPlayer);
        if (!player || !enemy) return;
        renderUnit(enemy, "enemyUnit");
        renderUnit(player, "playerUnit");
        renderWeaponEffect(enemy, "enemyWeaponEffect");
        renderWeaponEffect(player, "playerWeaponEffect");
        renderSlots(enemy, "enemySlots");
        renderSlots(player, "playerSlots");
        setHtml("enemyCurrent", cardHtml(enemy.current));
        setHtml("playerCurrent", cardHtml(player.current));
        renderPile(enemy, "enemyDeck", "enemyDiscard");
        renderPile(player, "playerDeck", "playerDiscard");
        renderTimer(enemy, "enemyTimer");
        renderTimer(player, "playerTimer");
        setHtml("battleLog", state.log.join(""));
        $("playBtn").disabled = !(player.current && player.phase === "decision") || Boolean(state.winner);
        $("skipBtn").disabled = !(player.current && player.phase === "decision") || Boolean(state.winner);
        $("enemyPortrait").textContent = enemy.character.Name.slice(0, 6);
        $("playerPortrait").textContent = player.character.Name.slice(0, 6);
        $("battleSeed").textContent = `速度 ${speedLabel()} · ${state.paused ? "暂停" : "运行"}`;
      }

      function loop(now) {
        const rawDt = (now - state.last) / 1000;
        state.last = now;
        const activeSpeed = state.mode === "turn" ? 1 : state.speed;
        const dt = state.paused || isTurnWaiting() ? 0 : rawDt * activeSpeed;
        if (dt > 0) {
          state.fighters.forEach((fighter) => updateFighter(fighter, dt));
        }
        render();
        requestAnimationFrame(loop);
      }

      function parseMaybeJson(value) {
        if (typeof value !== "string") return value;
        try { return JSON.parse(value); } catch { return value; }
      }

      async function importXlsxFiles(files) {
        if (!window.XLSX) {
          $("importState").textContent = "XLSX库未加载";
          return;
        }
        const next = structuredClone(state.data);
        for (const file of files) {
          const bytes = await file.arrayBuffer();
          const workbook = XLSX.read(bytes, { type: "array" });
          const sheet = workbook.Sheets[workbook.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(sheet, { defval: "" });
          const lower = file.name.toLowerCase();
          if (lower.includes("card")) {
            next.cards = rows.map((row) => ({ ...row, Effects: parseMaybeJson(row.Effects) }));
          } else if (lower.includes("character")) {
            next.characters = rows.map((row) => ({ ...row, DeckList: parseMaybeJson(row.DeckList) }));
          } else if (lower.includes("weapon")) {
            next.weapons = rows;
          } else if (lower.includes("keyword")) {
            next.keywords = rows;
          } else if (lower.includes("config")) {
            next.config = rows;
          }
        }
        normalizeData(next);
        $("importState").textContent = `已导入 ${files.length} 个表`;
        startBattle();
      }

      function positionTooltip(event) {
        const tooltip = $("gameTooltip");
        const margin = 12;
        const rect = tooltip.getBoundingClientRect();
        let x = event.clientX + margin;
        let y = event.clientY + margin;
        if (x + rect.width > window.innerWidth - margin) x = event.clientX - rect.width - margin;
        if (y + rect.height > window.innerHeight - margin) y = event.clientY - rect.height - margin;
        tooltip.style.transform = `translate(${Math.max(margin, x)}px, ${Math.max(margin, y)}px)`;
      }

      function showTooltip(text, event, pinned = false) {
        const tooltip = $("gameTooltip");
        tooltip.classList.toggle("pinned", pinned);
        if (pinned) {
          tooltip.innerHTML = `
            <div class="tooltip-head">
              <span>说明</span>
              <button class="tooltip-close" type="button" aria-label="关闭">×</button>
            </div>
            <div class="tooltip-body">${escapeHtml(text)}</div>
          `;
        } else {
          tooltip.textContent = text;
        }
        tooltip.classList.add("show");
        positionTooltip(event);
      }

      function hideTooltip() {
        const tooltip = $("gameTooltip");
        tooltip.classList.remove("show", "pinned");
        tooltip.style.transform = "translate(-999px, -999px)";
      }

      function setupTooltip() {
        const tooltip = $("gameTooltip");
        let activeTarget = null;
        let pinned = false;
        document.addEventListener("click", (event) => {
          const close = event.target.closest(".tooltip-close");
          if (close) {
            pinned = false;
            activeTarget = null;
            hideTooltip();
            return;
          }
          const target = event.target.closest("[data-tooltip]");
          if (target) {
            pinned = true;
            activeTarget = target;
            showTooltip(target.dataset.tooltip, event, true);
            event.stopPropagation();
            return;
          }
          if (pinned && !event.target.closest("#gameTooltip")) {
            pinned = false;
            activeTarget = null;
            hideTooltip();
          }
        });
        document.addEventListener("mouseover", (event) => {
          if (pinned) return;
          const target = event.target.closest("[data-tooltip]");
          if (!target) return;
          activeTarget = target;
          showTooltip(target.dataset.tooltip, event, false);
        });
        document.addEventListener("mousemove", (event) => {
          if (!activeTarget || pinned) return;
          positionTooltip(event);
        });
        document.addEventListener("mouseout", (event) => {
          if (pinned) return;
          if (!activeTarget || event.relatedTarget?.closest?.("[data-tooltip]") === activeTarget) return;
          activeTarget = null;
          hideTooltip();
        });
      }

      function setupPileViewer() {
        document.addEventListener("click", (event) => {
          const pile = event.target.closest(".pile[data-side][data-pile]");
          if (!pile) return;
          openPileViewer(pile.dataset.side, pile.dataset.pile);
        });
        $("cardViewerClose").addEventListener("click", closePileViewer);
        $("cardViewer").addEventListener("click", (event) => {
          if (event.target === $("cardViewer")) closePileViewer();
        });
      }

      function setSpeedButton(button) {
        if (!button) return;
        if (button.dataset.mode === "turn") {
          state.mode = "turn";
          state.speed = 1;
        } else {
          state.mode = "realtime";
          state.speed = Number(button.dataset.speed);
        }
        document.querySelectorAll(".speed").forEach((item) => item.classList.toggle("active", item === button));
        render();
      }

      function togglePause() {
        state.paused = !state.paused;
        $("pauseBtn").classList.toggle("active", state.paused);
        $("pauseBtn").textContent = state.paused ? "继续" : "暂停";
        render();
      }

      function shouldIgnoreShortcut(event) {
        const tag = event.target?.tagName;
        return event.metaKey || event.ctrlKey || event.altKey || ["INPUT", "TEXTAREA", "SELECT"].includes(tag) || event.target?.isContentEditable;
      }

      function setupShortcuts() {
        const speedButtons = [...document.querySelectorAll(".speed[data-speed]")];
        document.addEventListener("keydown", (event) => {
          if (shouldIgnoreShortcut(event)) return;
          const key = event.key.toLowerCase();
          if (/^[1-6]$/.test(key)) {
            setSpeedButton(speedButtons[Number(key) - 1]);
            event.preventDefault();
            return;
          }
          if (key === "0") {
            setSpeedButton(document.querySelector(".speed[data-mode='turn']"));
            event.preventDefault();
            return;
          }
          if (event.code === "Space") {
            togglePause();
            event.preventDefault();
            return;
          }
          if (key === "r") {
            startBattle();
            event.preventDefault();
          }
        });
      }

      document.querySelectorAll(".speed").forEach((button) => {
        button.addEventListener("click", () => setSpeedButton(button));
      });

      $("pauseBtn").addEventListener("click", togglePause);

      $("newBattleBtn").addEventListener("click", startBattle);
      $("playBtn").addEventListener("click", () => playCurrent(state.fighters.find((f) => f.isPlayer)));
      $("skipBtn").addEventListener("click", () => skipCurrent(state.fighters.find((f) => f.isPlayer)));
      $("importBtn").addEventListener("click", () => $("fileInput").click());
      $("fileInput").addEventListener("change", (event) => importXlsxFiles([...event.target.files]));

      normalizeData(state.data);
      setupTooltip();
      setupPileViewer();
      setupShortcuts();
      startBattle();
      requestAnimationFrame(loop);
    </script>
  </body>
</html>
