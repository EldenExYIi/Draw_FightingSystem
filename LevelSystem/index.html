<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>关卡系统 MVP</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #182331;
      --muted: #667386;
      --line: #d9e1ec;
      --accent: #2a8c73;
      --accent-soft: #edf9f5;
      --shadow: 0 18px 42px rgba(32, 45, 64, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }

    main {
      width: min(620px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .icon {
      width: 56px;
      height: 56px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--accent-soft);
      font-size: 30px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 7vw, 42px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    a {
      width: fit-content;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 24px;
      color: var(--accent);
      font-weight: 800;
      text-decoration: none;
    }

    a:hover,
    a:focus-visible {
      text-decoration: underline;
      outline: none;
    }
  </style>
</head>
<body>
  <main>
    <div class="icon" aria-hidden="true">⛓️</div>
    <h1>关卡系统</h1>
    <p>关卡系统 MVP 入口已预留。当前暂不制作具体玩法内容，后续可在这里接入商店、战斗循环与关卡进度。</p>
    <a href="../index.html">返回总入口 <span aria-hidden="true">›</span></a>
  </main>
</body>
</html>
