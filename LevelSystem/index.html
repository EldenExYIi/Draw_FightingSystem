<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Draw LevelSystem</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f5f1;
      --panel: #fff;
      --text: #17231f;
      --muted: #68756f;
      --line: #d6ded9;
      --accent: #287f68;
      --accent-soft: #e9f5f0;
      --shadow: 0 18px 44px rgba(28, 48, 40, .09);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .page { width: min(1080px, calc(100vw - 32px)); margin: 0 auto; padding: 36px 0 56px; }
    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--line);
    }
    .back { color: var(--accent); text-decoration: none; font-weight: 800; font-size: 14px; }
    h1 { margin: 18px 0 8px; font-size: clamp(30px, 5vw, 48px); line-height: 1.05; letter-spacing: 0; }
    .subtitle { margin: 0; color: var(--muted); line-height: 1.7; max-width: 700px; }
    .count {
      flex: 0 0 auto;
      padding: 12px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      box-shadow: var(--shadow);
      font-size: 13px;
    }
    .count strong { display: block; color: var(--text); font-size: 24px; line-height: 1; margin-bottom: 5px; }
    main { padding-top: 28px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 18px; }
    .version-card {
      min-height: 290px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 24px;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: inherit;
      text-decoration: none;
      box-shadow: var(--shadow);
      transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease;
    }
    .version-card:hover, .version-card:focus-visible {
      transform: translateY(-2px);
      border-color: var(--accent);
      box-shadow: 0 24px 58px rgba(28, 48, 40, .14);
      outline: none;
    }
    .eyebrow { margin: 0 0 12px; color: var(--accent); font-size: 13px; font-weight: 900; }
    h2 { margin: 0 0 12px; font-size: 26px; line-height: 1.2; letter-spacing: 0; }
    .description { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.7; }
    .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 18px; }
    .tag {
      padding: 5px 9px;
      border: 1px solid #b9d9ce;
      border-radius: 999px;
      background: var(--accent-soft);
      color: #1f6e5a;
      font-size: 12px;
      font-weight: 800;
    }
    .open-row { display: flex; align-items: center; justify-content: space-between; color: var(--accent); font-weight: 900; }
    .arrow { width: 36px; height: 36px; display: grid; place-items: center; border-radius: 50%; background: var(--accent); color: #fff; font-size: 22px; }
    @media (max-width: 680px) {
      .page { width: min(100vw - 24px, 1080px); padding-top: 24px; }
      header { display: block; }
      .count { width: fit-content; margin-top: 18px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div>
        <a class="back" href="../index.html">‹ 返回系统总入口</a>
        <h1>关卡系统版本库</h1>
        <p class="subtitle">从角色选择、商店构筑到自动战斗和局外结算，关卡版本将在这里独立留档。</p>
      </div>
      <div class="count"><strong>1</strong>可玩版本</div>
    </header>
    <main aria-label="关卡系统版本列表">
      <a class="version-card" href="Level_001/index.html">
        <div>
          <p class="eyebrow">2026.06.24 · Level 001</p>
          <h2>商店战斗循环关卡</h2>
          <p class="description">选择战士，从 20c 开始构筑卡组，通过自动牌链战斗赚取奖励与利息。累计三次失败后结算本局胜场。</p>
          <div class="tags">
            <span class="tag">角色选择</span>
            <span class="tag">全品类商店</span>
            <span class="tag">牌链战斗</span>
            <span class="tag">三败终局</span>
          </div>
        </div>
        <div class="open-row"><span>开始 Level 001</span><span class="arrow" aria-hidden="true">›</span></div>
      </a>
    </main>
  </div>
</body>
</html>
